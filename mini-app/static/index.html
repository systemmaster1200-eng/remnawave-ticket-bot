<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0f">
  <title>Remnawave — Менеджеры</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Remnawave</h1>
      <p class="subtitle">Поиск пользователя по ID или никнейму</p>
    </header>

    <section class="search-section">
      <div class="search-wrap">
        <input type="text" id="query" placeholder="ID или @username" autocomplete="off">
      </div>
      <button type="button" id="btn-search" class="btn-primary">Найти</button>
    </section>

    <div id="loading" class="loading hidden">Загрузка...</div>
    <div id="error" class="error hidden"></div>

    <main id="result" class="result hidden">
      <div class="user-header">
        <span class="username" id="result-username"></span>
        <span class="status-badge" id="result-status"></span>
      </div>

      <div id="actions-row" class="actions-row hidden">
        <button type="button" id="btn-reset-traffic" class="btn-action">Сброс трафика</button>
        <button type="button" id="btn-revoke-sub" class="btn-action">Перевыпуск подписки</button>
        <button type="button" id="btn-hwid-delete-all" class="btn-action btn-danger">Удалить все HWID</button>
      </div>

      <div class="tabs">
        <button type="button" class="tab active" data-tab="profile">Профиль</button>
        <button type="button" class="tab" data-tab="traffic">Трафик</button>
        <button type="button" class="tab" data-tab="dates">Даты</button>
        <button type="button" class="tab" data-tab="subscription">Подписка</button>
        <button type="button" class="tab" data-tab="hwid">Устройства</button>
      </div>

      <div class="panels">
        <div id="panel-profile" class="panel active"></div>
        <div id="panel-traffic" class="panel"></div>
        <div id="panel-dates" class="panel"></div>
        <div id="panel-subscription" class="panel"></div>
        <div id="panel-hwid" class="panel"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
